name: Test

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  elisp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Emacs
        uses: jcs090218/setup-emacs@master
        with:
          version: '30.2'

      - name: Install ELPA dependencies
        run: |
          chmod +x scripts/install-elpa-deps
          ./scripts/install-elpa-deps

      - name: Run lint checks
        run: |
          export HOME=$GITHUB_WORKSPACE
          chmod +x scripts/parse scripts/checkdoc scripts/load-check scripts/byte-compile
          ./scripts/parse eve.el test/eve-test.el
          ./scripts/checkdoc eve.el test/eve-test.el
          ./scripts/load-check
          ./scripts/byte-compile

      - name: Run ERT tests
        run: |
          export HOME=$GITHUB_WORKSPACE
          chmod +x scripts/ert
          ./scripts/ert

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Emacs
        uses: jcs090218/setup-emacs@master
        with:
          version: '30.2'

      - name: Install ELPA dependencies
        run: |
          chmod +x scripts/install-elpa-deps
          ./scripts/install-elpa-deps

      - name: Install texinfo
        run: sudo apt-get install -y texinfo

      - name: Regenerate docs and check for drift
        run: |
          export HOME=$GITHUB_WORKSPACE
          chmod +x scripts/gen-docs scripts/check-doc-drift
          ./scripts/gen-docs
          emacs --batch -l ox-texinfo --visit docs/eve.org \
            --funcall org-texinfo-export-to-texinfo
          makeinfo --no-split docs/eve.texi -o docs/eve.info
          install-info --dir=docs/dir docs/eve.info
          if ! git diff --quiet docs/eve.texi docs/eve.info docs/dir; then
            echo "::error::Committed doc artifacts are stale. Run 'devenv shell -- docs' and commit the result."
            git diff --stat docs/eve.texi docs/eve.info docs/dir
            exit 1
          fi
          ./scripts/check-doc-drift

  python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - name: Run CLI health suite
        run: |
          chmod +x scripts/check.sh scripts/startup-health-check.sh scripts/sync-python.sh scripts/lint.sh scripts/build.sh scripts/run-cli.sh
          ./scripts/check.sh
